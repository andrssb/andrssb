    <rect x="616" y="116" width="8" height="8" fill="#8E2820"/>
    <rect x="632" y="116" width="8" height="8" fill="#8E2820"/>
    <rect x="640" y="116" width="8" height="8" fill="#C0392B"/>
    <rect x="608" y="124" width="8" height="8" fill="#A9791C"/>
