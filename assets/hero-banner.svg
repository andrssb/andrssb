<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 200" width="830" height="200" role="img" aria-label="Banner pixelado de um heroi blindado voando pelo espaco">
  <defs>
    <linearGradient id="ceu" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1026"/>
      <stop offset="0.55" stop-color="#0A0E20"/>
      <stop offset="1" stop-color="#05070F"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.45" r="0.5">
      <stop offset="0" stop-color="#2A3A8C" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#1A2050" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#05070F" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- fundo -->
  <rect width="830" height="200" fill="url(#ceu)"/>
  <rect width="830" height="200" fill="url(#glow)"/>

